function validate(a) {

  if (!a.licenseEnd) p("Error", "License End", "License end date is required.");
  if (a.licenseEnd && new Date(a.licenseEnd) < new Date()) p("Warning", "License End", `Expired on ${a.licenseEnd}.`);
  else if (a.licenseEnd && new Date(a.licenseEnd) < new Date(Date.now() + 90*86400000)) p("Warning", "License End", `Expires within 90 days (${a.licenseEnd}).`);
  if (!a.upc) p("Error", "UPC", "UPC barcode is required.");
  if (!a.copyrightP) p("Error", "Copyright", "Sound recording copyright required.");
  const mi = a.tracks.filter(t => !t.isrc);
  if (mi.length > 0) p("Error", "ISRC", `${mi.length}/${a.tracks.length} tracks missing ISRC.`);

}

      {sel.size > 0 && (
        <div style={{ margin: "12px 28px 0", padding: "10px 16px", background: C.accDim, border: `1px solid ${C.accBrd}`, borderRadius: "8px", display: "flex", alignItems: "center", gap: "12px", fontSize: "12px" }}>
          <span style={{ fontWeight: 600, color: C.acc }}>{sel.size} selected</span>
          <div style={{ width: "1px", height: "18px", background: C.accBrd }} />
          <button onClick={bV} disabled={!!bulk} style={{ padding: "5px 14px", border: "none", borderRadius: "6px", background: bulk ? C.fgF : C.acc, color: C.bg, fontSize: "11px", fontWeight: 700, cursor: bulk ? "not-allowed" : "pointer" }}>{bulk === "v" ? "Validating..." : "Validate"}</button>
          <button onClick={bS} disabled={!!bulk} style={{ padding: "5px 14px", border: "none", borderRadius: "6px", background: bulk ? C.fgF : C.acc, color: C.bg, fontSize: "11px", fontWeight: 700, cursor: bulk ? "not-allowed" : "pointer" }}>{bulk === "s" ? "Submitting..." : "Submit"}</button>
          <button onClick={() => setSel(new Set())} style={{ marginLeft: "auto", background: "none", border: "none", fontSize: "12px", color: C.acc, cursor: "pointer", fontWeight: 500 }}>Clear</button>
        </div>
      )}
      <div style={{ padding: "14px 28px 28px" }}>
        <div style={{ background: C.srf, border: `1px solid ${C.brd}`, borderRadius: "8px", overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead><tr>
              <th style={{ padding: "10px 12px", background: C.bg, borderBottom: `1px solid ${C.brd}`, width: "40px", textAlign: "center" }}><input type="checkbox" checked={list.length > 0 && sel.size === list.length} onChange={togAll} style={{ width: "14px", height: "14px", cursor: "pointer", accentColor: C.acc }} /></th>
              {cols.map(c => <th key={c.k} onClick={() => srt(c.k)} style={{ padding: "10px 12px", background: C.bg, color: C.fgM, fontWeight: 600, fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.06em", textAlign: "left", borderBottom: `1px solid ${C.brd}`, cursor: "pointer", whiteSpace: "nowrap", userSelect: "none" }}>{c.l}{sortField === c.k && <span style={{ marginLeft: "4px", color: C.acc }}>{sortDir === "asc" ? "↑" : "↓"}</span>}</th>)}
            </tr></thead>
            <tbody>
              {list.map((a, i) => {
                const isSel = sel.has(a.id), bg = isSel ? C.accDim : i % 2 === 0 ? C.srf : C.srf2, exp = a.licenseEnd && new Date(a.licenseEnd) < new Date();
                return (
                  <tr key={a.id} style={{ background: bg, cursor: "pointer", transition: "background .1s" }} onMouseEnter={e => { e.currentTarget.style.background = C.brd; }} onMouseLeave={e => { e.currentTarget.style.background = bg; }}>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, textAlign: "center" }} onClick={e => { e.stopPropagation(); tog(a.id); }}><input type="checkbox" checked={isSel} onChange={() => tog(a.id)} style={{ width: "14px", height: "14px", cursor: "pointer", accentColor: C.acc }} /></td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}` }} onClick={() => setDetail(a)}>
                      <div style={{ fontWeight: 600, color: C.fg, fontSize: "13px" }}>{a.albumTitle}</div>
                      <div style={{ fontSize: "11px", color: C.fgF, marginTop: "1px", fontFamily: "'SF Mono', Menlo, monospace" }}>{a.asperaPath}</div>
                    </td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "12px", color: C.fgM }} onClick={() => setDetail(a)}>{a.subgenre}</td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "12px", color: C.fgM }} onClick={() => setDetail(a)}>{a.label}</td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "12px", color: a.territory ? C.fgM : C.err, fontWeight: a.territory ? 400 : 600 }} onClick={() => setDetail(a)}>{a.territory || "MISSING"}</td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "12px", color: a.licenseStart ? C.fgM : C.err, fontWeight: a.licenseStart ? 400 : 600, whiteSpace: "nowrap" }} onClick={() => setDetail(a)}>{a.licenseStart || "—"}</td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "12px", color: exp ? C.err : a.licenseEnd ? C.fgM : C.err, fontWeight: exp || !a.licenseEnd ? 600 : 400, whiteSpace: "nowrap" }} onClick={() => setDetail(a)}>{a.licenseEnd || "—"}{exp ? " ⚠" : ""}</td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}` }} onClick={() => setDetail(a)}><Badge value={a.rightsValidated} /></td>
                    <td style={{ padding: "11px 12px", borderBottom: `1px solid ${C.bg}` }} onClick={() => setDetail(a)}><Badge value={a.submissionStatus} /></td>
                  </tr>
                );
              })}
              {list.length === 0 && <tr><td colSpan={9} style={{ padding: "40px", textAlign: "center", color: C.fgF }}>No albums match.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {detail && <Detail album={albums.find(x => x.id === detail.id) || detail} onClose={() => setDetail(null)} onUpdate={up} />}
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
